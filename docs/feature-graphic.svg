<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <!-- Background -->
  <rect width="1024" height="500" fill="#0a0a0a"/>

  <!-- Subtle red glow behind compass -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e03030" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e03030" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="260" cy="250" r="220" fill="url(#glow)"/>

  <!-- Compass group (centered around 260, 250) -->
  <g transform="translate(260, 250)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#333" stroke-width="3"/>

    <!-- Tick marks -->
    <g stroke="#666" stroke-width="2">
      <line x1="0" y1="-180" x2="0" y2="-160"/>
      <line x1="180" y1="0" x2="160" y2="0"/>
      <line x1="0" y1="180" x2="0" y2="160"/>
      <line x1="-180" y1="0" x2="-160" y2="0"/>
    </g>
    <g stroke="#3a3a3a" stroke-width="1">
      <line x1="90" y1="-155" x2="80" y2="-138"/>
      <line x1="155" y1="-90" x2="138" y2="-80"/>
      <line x1="155" y1="90" x2="138" y2="80"/>
      <line x1="90" y1="155" x2="80" y2="138"/>
      <line x1="-90" y1="155" x2="-80" y2="138"/>
      <line x1="-155" y1="90" x2="-138" y2="80"/>
      <line x1="-155" y1="-90" x2="-138" y2="-80"/>
      <line x1="-90" y1="-155" x2="-80" y2="-138"/>
    </g>

    <!-- Cardinal labels -->
    <text x="0" y="-130" fill="#e03030" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">N</text>
    <text x="130" y="0" fill="#888" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">E</text>
    <text x="0" y="130" fill="#888" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">S</text>
    <text x="-130" y="0" fill="#888" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="middle">W</text>

    <!-- Needle pointing toward wordmark (rotated to point right toward the text) -->
    <g transform="rotate(60)">
      <!-- Red tip -->
      <polygon points="0,-110 -12,15 12,15" fill="#e03030"/>
      <!-- Gray tail -->
      <polygon points="0,110 -12,-15 12,-15" fill="#555"/>
    </g>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="10" fill="#ccc"/>
  </g>

  <!-- Wordmark and tagline -->
  <g transform="translate(560, 250)">
    <text x="0" y="-30" fill="#fff" font-family="-apple-system, sans-serif" font-size="86" font-weight="900" letter-spacing="6">LIQPASS</text>
    <line x1="6" y1="10" x2="60" y2="10" stroke="#e03030" stroke-width="3"/>
    <text x="0" y="50" fill="#aaa" font-family="-apple-system, sans-serif" font-size="22" font-weight="500" letter-spacing="1.5">Compass to the nearest open</text>
    <text x="0" y="80" fill="#aaa" font-family="-apple-system, sans-serif" font-size="22" font-weight="500" letter-spacing="1.5">liquor store.</text>
  </g>
</svg>
