<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Liqpass</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <svg id="theme-icon" viewBox="0 0 24 24" width="22" height="22"></svg>
    </button>

    <h1 class="title">LIQPASS</h1>

    <div class="compass-wrapper" id="compass-wrapper">
      <svg class="compass-layer" id="compass-rose" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="92" fill="none" stroke-width="2" id="rose-ring" class="rose-ring" />
        <g id="rose-ticks"></g>
        <text x="100" y="22" class="cardinal cardinal-n">N</text>
        <text x="178" y="105" class="cardinal">E</text>
        <text x="100" y="188" class="cardinal">S</text>
        <text x="22" y="105" class="cardinal">W</text>
      </svg>

      <svg class="compass-layer" id="compass-needle" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <polygon id="needle-tip" points="100,45 94,108 106,108" fill="#e03030" />
        <polygon id="needle-tail" points="100,155 94,92 106,92" class="needle-tail" />
        <circle cx="100" cy="100" r="6" class="needle-center" />
      </svg>
    </div>

    <div id="info-area"></div>

    <button id="start-btn" class="btn">Find Nearest Store</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
